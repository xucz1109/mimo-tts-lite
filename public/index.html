<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiMo TTS Lite — 文字转语音</title>
  <style>
    :root {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --card: #ffffff;
      --border: #e2e5f1;
      --text: #1a1a2e;
      --muted: #7b7f9e;
      --accent: #6c5ce7;
      --accent2: #a29bfe;
      --accent-hover: #5a4bd1;
      --accent-glow: rgba(108,92,231,0.12);
      --accent-light: #ede9fc;
      --danger: #e74c3c;
      --success: #27ae60;
      --warning: #f39c12;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 50%, #74b9ff 100%);
      padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
      color: #fff;
      box-shadow: 0 4px 20px rgba(108,92,231,0.25);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
    .header-badges { display: flex; gap: 6px; }
    .header-badge {
      font-size: 0.68rem; font-weight: 600;
      padding: 2px 8px; border-radius: 12px;
      background: rgba(255,255,255,0.2); backdrop-filter: blur(4px);
    }

    /* ── Main Layout ── */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 16px;
      max-width: 1200px; margin: 0 auto;
      padding: 14px 20px;
      min-height: calc(100vh - 64px);
      max-height: calc(100vh - 64px);
    }
    .left-col { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; min-height: 0; }
    .right-col { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; min-height: 0; }

    /* ── Card ── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 0.85rem; font-weight: 700; margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px; color: var(--text);
    }
    .card-title .icon { font-size: 1.1rem; }

    /* ── Collapsible ── */
    .card-title.collapsible { cursor: pointer; user-select: none; margin-bottom: 0; transition: margin-bottom 0.2s; }
    .card-title.collapsible .chevron {
      margin-left: auto; font-size: 0.8rem;
      transition: transform 0.25s; color: var(--muted);
    }
    .card-title.collapsible.open .chevron { transform: rotate(180deg); }
    .card-title.collapsible.open { margin-bottom: 14px; }
    .collapsible-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease, opacity 0.25s ease; opacity: 0; }
    .collapsible-body.open { max-height: 2000px; opacity: 1; }

    /* ── Result & History ── */
    .result-history-area {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
    }
    .result-section { padding: 14px; border-bottom: 1px solid var(--border); }
    .result-section .card-title { margin-bottom: 8px; }
    .audio-player { width: 100%; margin: 8px 0; border-radius: var(--radius-sm); height: 40px; }
    .result-empty { text-align: center; padding: 20px; color: var(--muted); font-size: 0.88rem; }
    .result-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .meta-info { display: flex; gap: 14px; margin-top: 8px; font-size: 0.76rem; color: var(--muted); }

    .history-section { padding: 12px 14px; }
    .history-section .card-title { margin-bottom: 8px; font-size: 0.82rem; }
    .history-list { max-height: 140px; overflow-y: auto; }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .history-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; background: var(--bg); border-radius: var(--radius-sm);
      margin-bottom: 6px; cursor: pointer; transition: all 0.15s; font-size: 0.82rem;
    }
    .history-item:hover { background: var(--accent-light); }
    .history-item .hist-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
    .history-item .hist-play { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1rem; padding: 2px; }
    .history-item .hist-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.85rem; padding: 2px; }
    .history-item .hist-del:hover { color: var(--danger); }
    .history-empty { text-align: center; padding: 16px 0; color: var(--muted); font-size: 0.82rem; }
    .history-clear-btn { text-align: center; margin-top: 8px; }

    /* ── Text Input ── */
    .text-area-card { flex: 1; display: flex; flex-direction: column; }
    .text-area-card .card { flex: 1; display: flex; flex-direction: column; }
    textarea {
      width: 100%; flex: 1; min-height: 120px;
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); font-size: 0.95rem; line-height: 1.7;
      padding: 14px; font-family: inherit; transition: border-color 0.2s; resize: none;
    }
    textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    textarea::placeholder { color: #b0b3c5; }
    .char-count { text-align: right; font-size: 0.76rem; color: var(--muted); margin-top: 6px; }

    /* ── Generate Button Bar ── */
    .generate-bar { display: flex; gap: 10px; margin-top: 12px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--accent); color: #fff;
      font-size: 0.95rem; font-weight: 700;
      border: none; border-radius: var(--radius-sm); padding: 12px 24px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn:hover:not(:disabled) { background: var(--accent-hover); box-shadow: 0 4px 16px rgba(108,92,231,0.3); transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-full { width: 100%; flex: 1; }
    .btn-sm { padding: 7px 14px; font-size: 0.82rem; font-weight: 600; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--accent-light); border-color: var(--accent); }

    /* ── Form Elements ── */
    label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 0.88rem; padding: 10px 12px; font-family: inherit; transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input::placeholder { color: #b0b3c5; }

    /* ── Slider ── */
    .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .slider-row label { min-width: 52px; margin-bottom: 0; font-size: 0.78rem; color: var(--muted); flex-shrink: 0; }
    .slider-row input[type="range"] {
      flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
      background: var(--border); border-radius: 2px; outline: none;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      background: var(--accent); border-radius: 50%; cursor: pointer;
      box-shadow: 0 1px 4px rgba(108,92,231,0.3);
    }
    .slider-row input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px; background: var(--accent);
      border-radius: 50%; cursor: pointer; border: none;
    }
    .slider-val {
      min-width: 42px; text-align: right; font-size: 0.78rem; color: var(--accent);
      font-variant-numeric: tabular-nums; flex-shrink: 0;
    }

    /* ── Chip Selection ── */
    .section-label { font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: block; }
    .chip-group { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .chip {
      padding: 5px 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 16px; font-size: 0.78rem; color: var(--muted);
      cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.active {
      background: var(--accent); border-color: var(--accent); color: #fff;
      box-shadow: 0 2px 8px rgba(108,92,231,0.2);
    }

    /* ── Format pills ── */
    .format-group { display: flex; gap: 5px; margin-bottom: 12px; }
    .format-pill {
      padding: 5px 14px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 16px; font-size: 0.78rem; color: var(--muted); cursor: pointer;
      transition: all 0.15s; user-select: none;
    }
    .format-pill:hover { border-color: var(--accent); color: var(--text); }
    .format-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── API Key ── */
    .api-key-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .api-key-row input { flex: 1; }
    .api-key-status { font-size: 0.72rem; color: var(--muted); margin-bottom: 12px; }

    /* ── Loading ── */
    .loading { display: none; text-align: center; padding: 24px; }
    .loading.show { display: block; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--muted); font-size: 0.85rem; }

    /* ── Proofread Results ── */
    .pr-summary {
      padding: 8px 12px; background: var(--accent-light); border-radius: var(--radius-sm);
      font-size: 0.82rem; color: var(--text); margin-bottom: 8px; line-height: 1.6;
    }
    .pr-pass { text-align: center; padding: 16px; color: var(--success); font-size: 0.88rem; }
    .pr-section-title {
      font-size: 0.78rem; font-weight: 700; color: var(--text);
      margin: 10px 0 6px; display: flex; align-items: center; gap: 6px;
    }
    .pr-item {
      padding: 10px 12px; background: var(--bg); border-radius: var(--radius-sm);
      margin-bottom: 8px; border-left: 3px solid var(--accent);
    }
    .pr-item-awkward { border-left-color: #2980b9; }
    .pr-item-poly { border-left-color: #e67e22; }
    .pr-item-label {
      display: inline-block; padding: 1px 8px; border-radius: 10px;
      font-size: 0.68rem; font-weight: 700; margin-bottom: 4px;
    }
    .pr-label-awkward { background: #ebf5fb; color: #2980b9; }
    .pr-label-poly { background: #fef3e2; color: #e67e22; }
    .pr-original { font-size: 0.82rem; color: var(--text); margin: 3px 0; }
    .pr-original del {
      background: #fde8e8; color: #c0392b; text-decoration: line-through;
      padding: 0 3px; border-radius: 3px;
    }
    .pr-suggestion { font-size: 0.82rem; color: var(--success); margin: 2px 0; }
    .pr-suggestion ins {
      background: #e8f8f5; text-decoration: none;
      padding: 0 3px; border-radius: 3px; font-weight: 600;
    }
    .pr-reason { font-size: 0.74rem; color: var(--muted); margin-top: 2px; }
    .pr-poly-char {
      font-size: 1.1rem; font-weight: 700; color: var(--text); margin-right: 6px;
    }
    .pr-poly-pinyin {
      display: inline-block; padding: 1px 6px; background: #fef9e7; border-radius: 8px;
      font-size: 0.72rem; color: var(--warning); font-weight: 600; margin-right: 6px;
    }

    /* ── Error ── */
    .error {
      display: none; background: #fdf0ef; border: 1px solid var(--danger);
      border-radius: var(--radius-sm); padding: 10px 14px;
      color: var(--danger); font-size: 0.82rem; margin-top: 10px;
    }
    .error.show { display: block; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .main-layout { grid-template-columns: 1fr; padding: 16px; }
      .header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
      .header-badges { display: none; }
    }
  </style>
</head>
<body>

<!-- ══════════ Header ══════════ -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">🎙️ MiMo TTS Lite</div>
    <div class="header-badges">
      <span class="header-badge">mimo-v2-audio-tts</span>
      <span class="header-badge">24kHz WAV</span>
    </div>
  </div>
</div>

<!-- ══════════ Main Layout ══════════ -->
<div class="main-layout">

  <!-- ── Left Column ── -->
  <div class="left-col">

    <!-- Result & History -->
    <div class="result-history-area">
      <div class="result-section" id="resultSection">
        <div class="card-title"><span class="icon">🎧</span> 生成结果</div>
        <div id="resultEmpty" class="result-empty">生成的语音将在这里播放</div>
        <div id="resultContent" style="display:none;">
          <audio id="audioPlayer" class="audio-player" controls></audio>
          <div class="result-actions">
            <button class="btn btn-outline btn-sm" onclick="playAgain()">🔄 重播</button>
            <button class="btn btn-sm" onclick="download()">⬇️ 下载</button>
          </div>
          <div class="meta-info">
            <span id="metaSize"></span>
            <span id="metaTime"></span>
            <span id="metaVoice"></span>
          </div>
        </div>
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p id="loadingText">正在生成语音，请稍候…</p>
        </div>
        <div class="error" id="errorMsg"></div>
      </div>

      <div class="history-section">
        <div class="card-title collapsible" onclick="toggleCollapse(this)">
          <span class="icon">📜</span> 历史记录 <span style="font-size:0.76rem; color:var(--muted); font-weight:400; margin-left:4px;" id="historyCount">(0)</span>
          <span class="chevron">▼</span>
        </div>
        <div class="collapsible-body">
          <div class="history-list" id="historyList">
            <div class="history-empty">暂无历史记录</div>
          </div>
          <div class="history-clear-btn" id="clearHistoryBtn" style="display:none;">
            <button class="btn btn-outline btn-sm" onclick="clearHistory()">🗑️ 清空</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Text Input -->
    <div class="text-area-card">
      <div class="card" style="flex:1; display:flex; flex-direction:column;">
        <div class="card-title"><span class="icon">📝</span> 输入文本</div>
        <textarea id="textInput" placeholder="在这里输入你想转换为语音的文字…" style="flex:1; min-height:100px;"></textarea>
        <div class="char-count"><span id="charCount">0</span> / 10000</div>
        <div class="generate-bar">
          <button class="btn btn-full" id="generateBtn" onclick="generate()">
            🎵 生成语音 <span style="font-size:0.76rem; font-weight:400; opacity:0.8;">Ctrl+Enter</span>
          </button>
          <button class="btn btn-outline" id="undoBtn" onclick="undoText()" title="撤销" style="white-space:nowrap; padding:12px 14px;">↩️</button>
          <button class="btn btn-outline" id="redoBtn" onclick="redoText()" title="恢复" style="white-space:nowrap; padding:12px 14px;">↪️</button>
        </div>
      </div>
    </div>

    <!-- Proofread Card -->
    <div class="card" id="proofreadCard">
      <div class="card-title"><span class="icon">🔍</span> 文本校验</div>
      <button class="btn btn-outline btn-full" id="proofreadBtn" onclick="proofread()" style="margin-bottom:10px;">
        🔍 检查不通顺 &amp; 多音字
      </button>
      <div id="proofreadLoading" style="display:none; text-align:center; padding:12px;">
        <div class="spinner" style="width:20px; height:20px; border-width:2px;"></div>
        <p style="color:var(--muted); font-size:0.78rem; margin-top:4px;">正在校验中…</p>
      </div>
      <div id="proofreadResult" style="display:none;"></div>
      <div id="proofreadError" class="error"></div>
    </div>

  </div>

  <!-- ── Right Column: Settings ── -->
  <div class="right-col">

    <!-- API Key -->
    <div class="card">
      <div class="card-title"><span class="icon">🔑</span> API Key</div>
      <div class="api-key-row">
        <input type="password" id="apiKeyInput" placeholder="输入 MiMo API Key" autocomplete="off" />
        <button class="btn btn-outline btn-sm" onclick="toggleKeyVisibility()" style="padding:8px 10px;">
          <span id="keyEyeIcon">👁️</span>
        </button>
        <button class="btn btn-sm" onclick="saveApiKey()" style="white-space:nowrap;">保存</button>
      </div>
      <div class="api-key-status" id="apiKeyStatus">API Key 随请求发送到后端调用 API</div>
    </div>

    <!-- Voice & Style -->
    <div class="card">
      <div class="card-title"><span class="icon">🎨</span> 音色与语气</div>

      <!-- Voice -->
      <span class="section-label">🔊 音色</span>
      <div class="chip-group" id="voiceChips">
        <div class="chip active" data-value="mimo_default">默认</div>
        <div class="chip" data-value="default_zh">中文</div>
        <div class="chip" data-value="default_en">英文</div>
      </div>

      <!-- Emotion -->
      <span class="section-label">😊 情感</span>
      <div class="chip-group" id="emotionChips">
        <div class="chip active" data-value="">默认</div>
        <div class="chip" data-value="开心">😊 开心</div>
        <div class="chip" data-value="悲伤">😢 悲伤</div>
        <div class="chip" data-value="生气">😠 生气</div>
        <div class="chip" data-value="平静">😌 平静</div>
        <div class="chip" data-value="深情款款">💕 深情</div>
        <div class="chip" data-value="慵懒 刚睡醒">😴 慵懒</div>
        <div class="chip" data-value="撒娇 夹子音">🥰 撒娇</div>
      </div>

      <!-- Custom requirements -->
      <span class="section-label">✏️ 自定义要求（与上方选项融合）</span>
      <input type="text" id="customStyle" placeholder="如：标准广播腔，抑扬顿挫，断句增加500ms" />
    </div>

    <!-- Parameters -->
    <div class="card">
      <div class="card-title collapsible open" onclick="toggleCollapse(this)">
        <span class="icon">⚙️</span> 参数调节 <span class="chevron">▼</span>
      </div>
      <div class="collapsible-body open">

      <!-- Speed -->
      <div class="slider-row">
        <label>语速</label>
        <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateSliderVal('speedVal', this.value, 'x')" />
        <span class="slider-val" id="speedVal">1.0x</span>
      </div>

      <!-- Volume -->
      <div class="slider-row">
        <label>音量</label>
        <input type="range" id="volumeSlider" min="0" max="200" step="5" value="100" oninput="updateSliderVal('volumeVal', this.value, '%')" />
        <span class="slider-val" id="volumeVal">100%</span>
      </div>

      <!-- Pitch -->
      <div class="slider-row">
        <label>音高</label>
        <input type="range" id="pitchSlider" min="-12" max="12" step="1" value="0" oninput="updateSliderVal('pitchVal', this.value, '')" />
        <span class="slider-val" id="pitchVal">0</span>
      </div>

      </div>
    </div>

  </div>
</div>

<script>
  // ── State ──
  let currentBlobUrl = null;
  let currentFilename = 'tts_output.wav';
  let currentMimeType = 'audio/wav';
  let history = JSON.parse(localStorage.getItem('tts_history') || '[]');

  // ── Init ──
  document.addEventListener('DOMContentLoaded', () => {
    initChips();
    renderHistory();
    loadApiKey();
  });

  // ── Collapsible ──
  function toggleCollapse(el) {
    const body = el.nextElementSibling;
    el.classList.toggle('open');
    body.classList.toggle('open');
  }

  // ── API Key ──
  function loadApiKey() {
    const saved = localStorage.getItem('mimo_api_key');
    if (saved) {
      document.getElementById('apiKeyInput').value = saved;
      document.getElementById('apiKeyStatus').innerHTML = '<span style="color:var(--success)">✅ 已加载</span>';
    }
  }
  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) { document.getElementById('apiKeyStatus').innerHTML = '<span style="color:var(--danger)">请输入 API Key</span>'; return; }
    localStorage.setItem('mimo_api_key', key);
    document.getElementById('apiKeyStatus').innerHTML = '<span style="color:var(--success)">✅ 已保存</span>';
  }
  function toggleKeyVisibility() {
    const input = document.getElementById('apiKeyInput');
    const icon = document.getElementById('keyEyeIcon');
    if (input.type === 'password') { input.type = 'text'; icon.textContent = '🙈'; }
    else { input.type = 'password'; icon.textContent = '👁️'; }
  }

  // ── Chip Selection ──
  function initChips() {
    ['voiceChips', 'emotionChips'].forEach(id => {
      document.getElementById(id).addEventListener('click', e => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        document.getElementById(id).querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      });
    });
  }
  function getChipValue(groupId) {
    const active = document.querySelector(`#${groupId} .chip.active`);
    return active ? active.dataset.value : '';
  }

  // ── Build Style String (merge chips + custom) ──
  function buildStyle() {
    const parts = [
      getChipValue('emotionChips'),
      '语速稳定，保持匀速朗读，前后语速一致',
    ].filter(Boolean);

    const custom = document.getElementById('customStyle').value.trim();
    if (custom) {
      parts.push(custom);
    }
    return parts.join(' ');
  }

  // ── Undo / Redo ──
  let undoStack = [];
  let redoStack = [];
  let undoSaveNeeded = true;

  function undoText() {
    if (undoStack.length === 0) return;
    redoStack.push(textInput.value);
    textInput.value = undoStack.pop();
    charCount.textContent = textInput.value.length;
    textInput.focus();
    updateUndoRedoBtn();
  }
  function redoText() {
    if (redoStack.length === 0) return;
    undoStack.push(textInput.value);
    textInput.value = redoStack.pop();
    charCount.textContent = textInput.value.length;
    textInput.focus();
    updateUndoRedoBtn();
  }
  function updateUndoRedoBtn() {
    document.getElementById('undoBtn').style.opacity = undoStack.length > 0 ? '1' : '0.4';
    document.getElementById('redoBtn').style.opacity = redoStack.length > 0 ? '1' : '0.4';
  }

  // ── UI Refs ──
  const textInput = document.getElementById('textInput');
  const charCount = document.getElementById('charCount');
  const generateBtn = document.getElementById('generateBtn');
  const loadingEl = document.getElementById('loading');
  const errorMsg = document.getElementById('errorMsg');

  textInput.addEventListener('input', () => { charCount.textContent = textInput.value.length; });
  textInput.addEventListener('keydown', () => {
    if (undoSaveNeeded) {
      const lastSaved = undoStack.length > 0 ? undoStack[undoStack.length - 1] : null;
      if (lastSaved !== textInput.value) {
        undoStack.push(textInput.value);
        if (undoStack.length > 50) undoStack.shift();
        redoStack = [];
        updateUndoRedoBtn();
      }
      undoSaveNeeded = false;
    }
  });
  textInput.addEventListener('keyup', () => { undoSaveNeeded = true; });
  textInput.addEventListener('mouseup', () => { undoSaveNeeded = true; });

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
    setTimeout(() => errorMsg.classList.remove('show'), 8000);
  }

  // ── Format ──
  function updateSliderVal(valId, value, suffix) {
    document.getElementById(valId).textContent = value + suffix;
  }

  // ── Generate ──
  async function generate() {
    const text = textInput.value.trim();
    if (!text) { showError('请输入文字'); return; }

    generateBtn.disabled = true;
    loadingEl.classList.add('show');
    document.getElementById('resultContent').style.display = 'none';
    document.getElementById('resultEmpty').style.display = 'none';
    errorMsg.classList.remove('show');
    const startTime = Date.now();

    const style = buildStyle();
    const voice = getChipValue('voiceChips');

    try {
      const body = {
        text,
        style: style || undefined,
        voice: voice || undefined,
        speed: parseFloat(document.getElementById('speedSlider').value),
        pitch: parseInt(document.getElementById('pitchSlider').value),
        volume: parseInt(document.getElementById('volumeSlider').value),
      };
      const pageApiKey = document.getElementById('apiKeyInput').value.trim();
      if (pageApiKey) body.apiKey = pageApiKey;

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 300000);
      const res = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: controller.signal,
      });
      clearTimeout(timeoutId);
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);

      const byteChars = atob(data.audio);
      const byteArray = new Uint8Array(byteChars.length);
      for (let i = 0; i < byteChars.length; i++) byteArray[i] = byteChars.charCodeAt(i);

      const blob = new Blob([byteArray], { type: data.mimeType || 'audio/wav' });
      currentMimeType = data.mimeType || 'audio/wav';

      if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
      currentBlobUrl = URL.createObjectURL(blob);
      currentFilename = data.filename || `tts_output.${data.format || 'wav'}`;

      const audioPlayer = document.getElementById('audioPlayer');
      audioPlayer.src = currentBlobUrl;
      audioPlayer.play().catch(() => {});

      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      document.getElementById('metaSize').textContent = `📏 ${(data.size / 1024).toFixed(1)} KB`;
      document.getElementById('metaTime').textContent = `⏱️ ${elapsed}s`;
      document.getElementById('metaVoice').textContent = style ? `🎨 ${style}` : '';

      document.getElementById('resultContent').style.display = 'block';

      addHistory({
        text: text.slice(0, 100),
        style: style || '默认',
        voice: voice || '默认',
        speed: parseFloat(document.getElementById('speedSlider').value),
        volume: parseInt(document.getElementById('volumeSlider').value),
        pitch: parseInt(document.getElementById('pitchSlider').value),
        filename: currentFilename,
        size: data.size,
        time: new Date().toLocaleString('zh-CN'),
        mimeType: currentMimeType,
      });
    } catch (err) {
      const msg = err.name === 'AbortError' ? '请求超时（5分钟），请稍后重试' : err.message;
      showError(msg);
      document.getElementById('resultEmpty').style.display = 'block';
    } finally {
      generateBtn.disabled = false;
      loadingEl.classList.remove('show');
      document.getElementById('loadingText').textContent = '正在生成语音，请稍候…';
    }
  }

  // ── Proofread ──
  async function proofread() {
    const text = textInput.value.trim();
    if (!text) { showError('请先输入文字'); return; }

    const btn = document.getElementById('proofreadBtn');
    const loading = document.getElementById('proofreadLoading');
    const result = document.getElementById('proofreadResult');
    const errEl = document.getElementById('proofreadError');

    btn.disabled = true;
    loading.style.display = 'block';
    result.style.display = 'none';
    errEl.classList.remove('show');

    try {
      const body = { text };
      const pageApiKey = document.getElementById('apiKeyInput').value.trim();
      if (pageApiKey) body.apiKey = pageApiKey;

      const res = await fetch('/api/proofread', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);

      renderProofreadResult(data);
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
      setTimeout(() => errEl.classList.remove('show'), 8000);
    } finally {
      btn.disabled = false;
      loading.style.display = 'none';
    }
  }

  function renderProofreadResult(data) {
    const el = document.getElementById('proofreadResult');
    const awkward = data.awkward || [];
    const poly = data.polyphonic || [];
    let html = '';

    if (data.summary) {
      html += `<div class="pr-summary">💡 ${escHtml(data.summary)}</div>`;
    }

    if (awkward.length === 0 && poly.length === 0 && !data.summary) {
      html = '<div class="pr-pass">✅ 文本校验通过，未发现问题</div>';
    }

    // Awkward phrasing
    if (awkward.length > 0) {
      html += '<div class="pr-section-title">📝 不通顺</div>';
      for (const item of awkward) {
        html += `<div class="pr-item pr-item-awkward">
          ${item.position ? `<span style="font-size:0.72rem; color:var(--muted);">${escHtml(item.position)}</span>` : ''}
          <div class="pr-original">原文：<del>${escHtml(item.original || '')}</del></div>
          <div class="pr-suggestion">建议：<ins>${escHtml(item.suggestion || '')}</ins></div>
          ${item.reason ? `<div class="pr-reason">${escHtml(item.reason)}</div>` : ''}
        </div>`;
      }
    }

    // Polyphonic characters
    if (poly.length > 0) {
      html += '<div class="pr-section-title">🔤 多音字</div>';
      for (const item of poly) {
        html += `<div class="pr-item pr-item-poly">
          <span class="pr-poly-char">${escHtml(item.character || '')}</span>
          <span class="pr-poly-pinyin">${escHtml(item.pinyin || '')}</span>
          ${item.context ? `<span style="font-size:0.78rem; color:var(--text);">"${escHtml(item.context)}"</span>` : ''}
          ${item.note ? `<div class="pr-reason">${escHtml(item.note)}</div>` : ''}
        </div>`;
      }
    }

    el.innerHTML = html;
    el.style.display = 'block';
  }

  // ── Playback ──
  function playAgain() {
    document.getElementById('audioPlayer').currentTime = 0;
    document.getElementById('audioPlayer').play().catch(() => {});
  }
  function download() {
    if (!currentBlobUrl) return;
    const a = document.createElement('a');
    a.href = currentBlobUrl; a.download = currentFilename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  // ── History ──
  function addHistory(item) {
    history.unshift(item);
    if (history.length > 20) history = history.slice(0, 20);
    localStorage.setItem('tts_history', JSON.stringify(history));
    renderHistory();
  }
  function renderHistory() {
    const list = document.getElementById('historyList');
    const count = document.getElementById('historyCount');
    const clearBtn = document.getElementById('clearHistoryBtn');
    count.textContent = `(${history.length})`;

    if (history.length === 0) {
      list.innerHTML = '<div class="history-empty">暂无历史记录</div>';
      clearBtn.style.display = 'none';
      return;
    }
    clearBtn.style.display = '';
    list.innerHTML = history.map((h, i) => {
      const parts = [];
      if (h.style && h.style !== '默认') parts.push(escHtml(h.style));
      if (h.speed && h.speed !== 1) parts.push(`${h.speed}x`);
      if (h.format && h.format !== 'wav') parts.push(h.format.toUpperCase());
      const params = parts.length ? parts.join(' · ') : '默认';
      return `
      <div class="history-item" onclick="playHistory(${i})">
        <div style="flex:1; overflow:hidden;">
          <div class="hist-text">${escHtml(h.text)}</div>
          <div style="font-size:0.72rem; color:var(--accent2);">${params} · ${h.time}</div>
        </div>
        <button class="hist-play" title="播放">▶️</button>
        <button class="hist-del" onclick="event.stopPropagation(); deleteHistory(${i})" title="删除">✕</button>
      </div>`;
    }).join('');
  }
  async function playHistory(index) {
    const h = history[index];
    if (!h) return;

    showError('正在重新生成音频...');
    
    try {
      const body = {
        text: h.text,
        style: h.style !== '默认' ? h.style : undefined,
        voice: h.voice !== '默认' ? h.voice : undefined,
        speed: h.speed,
        pitch: h.pitch,
        volume: h.volume,
      };
      const pageApiKey = document.getElementById('apiKeyInput').value.trim();
      if (pageApiKey) body.apiKey = pageApiKey;

      const res = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);

      const byteChars = atob(data.audio);
      const byteArray = new Uint8Array(byteChars.length);
      for (let i = 0; i < byteChars.length; i++) byteArray[i] = byteChars.charCodeAt(i);
      const blob = new Blob([byteArray], { type: data.mimeType || 'audio/wav' });
      new Audio(URL.createObjectURL(blob)).play();
      errorMsg.classList.remove('show');
    } catch (err) {
      showError('播放失败：' + err.message);
    }
  }
  function deleteHistory(index) {
    if (!confirm('确定删除？')) return;
    history.splice(index, 1);
    localStorage.setItem('tts_history', JSON.stringify(history));
    renderHistory();
  }
  function clearHistory() {
    if (!confirm('确定清空所有历史？')) return;
    history = [];
    localStorage.setItem('tts_history', JSON.stringify(history));
    renderHistory();
  }
  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Keyboard ──
  textInput.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); generate(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undoText(); }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redoText(); }
  });
</script>
</body>
</html>
